<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budgets – ExpenseIQ</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand"><span>💸</span> ExpenseIQ</div>
    <nav>
      <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
      <a href="transactions.html" class="nav-link">💳 Transactions</a>
      <a href="budgets.html" class="nav-link active">🎯 Budgets</a>
      <a href="reports.html" class="nav-link">📈 Reports</a>
    </nav>
    <div class="sidebar-footer">
      <span id="user-name-display"></span>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Budget Manager</h2>
      <input type="month" id="budget-month" onchange="loadBudgets()" />
    </div>

    <!-- Set Budget Form -->
    <div class="form-card">
      <h3>Set Budget Limit</h3>
      <form onsubmit="handleSetBudget(event)" class="transaction-form">
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="budget-category" required>
              <option value="food">🍔 Food</option>
              <option value="travel">✈️ Travel</option>
              <option value="bills">💡 Bills</option>
              <option value="shopping">🛍️ Shopping</option>
              <option value="health">💊 Health</option>
              <option value="education">📚 Education</option>
              <option value="other">📦 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Monthly Limit (₹)</label>
            <input type="number" id="budget-limit" placeholder="5000" min="1" required />
          </div>
        </div>
        <button type="submit" class="btn-primary">Set Budget</button>
        <p id="budget-msg" class="form-msg"></p>
      </form>
    </div>

    <!-- Budget Cards with Progress Bars -->
    <div id="budget-list" class="budget-list"></div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/budgets.js"></script>
</body>
</html>
