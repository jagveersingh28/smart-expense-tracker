<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Expense Tracker – Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <span class="brand-icon">💸</span>
      <h1>ExpenseIQ</h1>
      <p>Smart tracking for smarter spending</p>
    </div>

    <!-- Tab toggle between Login and Signup -->
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="showTab('login')">Login</button>
      <button class="tab-btn"        onclick="showTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Login</button>
      <p id="login-msg" class="form-msg"></p>
    </form>

    <!-- SIGNUP FORM (hidden by default) -->
    <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your Name" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters" required />
      </div>
      <button type="submit" class="btn-primary" id="signup-btn">Create Account</button>
      <p id="signup-msg" class="form-msg"></p>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:0.85rem;">
      <a href="admin-login.html" style="color:var(--text-muted)">🛡️ Admin Login</a>
    </p>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
