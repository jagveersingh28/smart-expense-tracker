<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users – Admin – ExpenseIQ</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar admin-sidebar">
    <div class="sidebar-brand"><span>🛡️</span> Admin Panel</div>
    <nav>
      <a href="admin-dashboard.html" class="nav-link">📊 Overview</a>
      <a href="admin-users.html"     class="nav-link active">👥 Users</a>
      <a href="admin-logs.html"      class="nav-link">📋 Activity Logs</a>
    </nav>
    <div class="sidebar-footer">
      <span id="admin-name-display"></span>
      <button onclick="adminLogout()" class="btn-logout">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>All Users</h2>
      <span class="admin-badge">🛡️ Administrator</span>
    </div>

    <!-- Search bar -->
    <div class="filters-bar" style="margin-bottom:20px;">
      <input type="text" id="user-search" placeholder="🔍 Search by name or email..." oninput="filterUsers()" style="max-width:320px;"/>
    </div>

    <!-- Users Table -->
    <div class="form-card">
      <table class="report-table" id="users-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
            <th>Transactions</th>
            <th>Total Spent</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="8" style="text-align:center;color:var(--text-muted)">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-users.js"></script>
</body>
</html>
