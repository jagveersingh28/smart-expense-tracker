<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Logs – Admin – ExpenseIQ</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar admin-sidebar">
    <div class="sidebar-brand"><span>🛡️</span> Admin Panel</div>
    <nav>
      <a href="admin-dashboard.html" class="nav-link">📊 Overview</a>
      <a href="admin-users.html"     class="nav-link">👥 Users</a>
      <a href="admin-logs.html"      class="nav-link active">📋 Activity Logs</a>
    </nav>
    <div class="sidebar-footer">
      <span id="admin-name-display"></span>
      <button onclick="adminLogout()" class="btn-logout">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Activity Logs</h2>
      <span class="admin-badge">🛡️ Administrator</span>
    </div>

    <!-- Filter bar -->
    <div class="filters-bar" style="margin-bottom:20px;">
      <input type="text" id="log-search" placeholder="🔍 Search by email..." oninput="filterLogs()" style="max-width:280px;"/>
      <select id="log-action-filter" onchange="filterLogs()">
        <option value="">All Actions</option>
        <option value="login">Login</option>
        <option value="signup">Signup</option>
        <option value="failed_login">Failed Login</option>
        <option value="admin_login">Admin Login</option>
      </select>
    </div>

    <!-- Logs Table -->
    <div class="form-card">
      <table class="report-table">
        <thead>
          <tr>
            <th>#</th>
            <th>User Name</th>
            <th>Email</th>
            <th>Action</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody id="logs-body">
          <tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading logs...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-logs.js"></script>
</body>
</html>
