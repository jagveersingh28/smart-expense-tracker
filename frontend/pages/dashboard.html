<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – ExpenseIQ</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ── SIDEBAR NAV ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span>💸</span> ExpenseIQ
    </div>
    <nav>
      <a href="dashboard.html" class="nav-link active">📊 Dashboard</a>
      <a href="transactions.html" class="nav-link">💳 Transactions</a>
      <a href="budgets.html" class="nav-link">🎯 Budgets</a>
      <a href="reports.html" class="nav-link">📈 Reports</a>
    </nav>
    <div class="sidebar-footer">
      <span id="user-name-display"></span>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ────────────────────────────────────────── -->
  <main class="main-content">
    <div class="page-header">
      <h2>Dashboard</h2>
      <!-- Month picker to filter data -->
      <input type="month" id="month-picker" onchange="loadDashboard()" />
    </div>

    <!-- Summary Cards -->
    <div class="cards-grid">
      <div class="card income-card">
        <p class="card-label">Total Income</p>
        <h3 class="card-value" id="total-income">₹0</h3>
      </div>
      <div class="card expense-card">
        <p class="card-label">Total Expenses</p>
        <h3 class="card-value" id="total-expense">₹0</h3>
      </div>
      <div class="card balance-card">
        <p class="card-label">Balance</p>
        <h3 class="card-value" id="balance">₹0</h3>
      </div>
    </div>

    <!-- Budget Alerts Section -->
    <div id="alerts-section" class="alerts-section"></div>

    <!-- Charts Row -->
    <div class="charts-row">
      <div class="chart-box">
        <h4>Spending by Category</h4>
        <canvas id="pie-chart"></canvas>
      </div>
      <div class="chart-box">
        <h4>Income vs Expense (6 months)</h4>
        <canvas id="bar-chart"></canvas>
      </div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
