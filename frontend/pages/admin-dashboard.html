<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – ExpenseIQ</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ── ADMIN SIDEBAR ───────────────────────────────────────── -->
  <aside class="sidebar admin-sidebar">
    <div class="sidebar-brand">
      <span>🛡️</span> Admin Panel
    </div>
    <nav>
      <a href="admin-dashboard.html" class="nav-link active">📊 Overview</a>
      <a href="admin-users.html"     class="nav-link">👥 Users</a>
      <a href="admin-logs.html"      class="nav-link">📋 Activity Logs</a>
    </nav>
    <div class="sidebar-footer">
      <span id="admin-name-display"></span>
      <button onclick="adminLogout()" class="btn-logout">Logout</button>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ───────────────────────────────────────── -->
  <main class="main-content">
    <div class="page-header">
      <h2>Admin Overview</h2>
      <span class="admin-badge">🛡️ Administrator</span>
    </div>

    <!-- Stats Cards -->
    <div class="cards-grid">
      <div class="card" style="border-left-color:#6c63ff">
        <p class="card-label">Total Users</p>
        <h3 class="card-value" id="stat-users" style="color:#6c63ff">0</h3>
      </div>
      <div class="card" style="border-left-color:#2ecc71">
        <p class="card-label">Total Transactions</p>
        <h3 class="card-value" id="stat-txns" style="color:#2ecc71">0</h3>
      </div>
      <div class="card" style="border-left-color:#f39c12">
        <p class="card-label">Today's Logins</p>
        <h3 class="card-value" id="stat-logins" style="color:#f39c12">0</h3>
      </div>
      <div class="card income-card">
        <p class="card-label">Total Income Tracked</p>
        <h3 class="card-value" id="stat-income">₹0</h3>
      </div>
      <div class="card expense-card">
        <p class="card-label">Total Expense Tracked</p>
        <h3 class="card-value" id="stat-expense">₹0</h3>
      </div>
    </div>

    <!-- Recent Signups -->
    <div class="form-card">
      <h3>🆕 Recent Signups</h3>
      <table class="report-table" id="recent-users-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Joined</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody id="recent-users-body"></tbody>
      </table>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-dashboard.js"></script>
</body>
</html>
