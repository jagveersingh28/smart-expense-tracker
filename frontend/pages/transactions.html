<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transactions – ExpenseIQ</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand"><span>💸</span> ExpenseIQ</div>
    <nav>
      <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
      <a href="transactions.html" class="nav-link active">💳 Transactions</a>
      <a href="budgets.html" class="nav-link">🎯 Budgets</a>
      <a href="reports.html" class="nav-link">📈 Reports</a>
    </nav>
    <div class="sidebar-footer">
      <span id="user-name-display"></span>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h2>Transactions</h2>
    </div>

    <!-- Add Transaction Form -->
    <div class="form-card">
      <h3>Add New Transaction</h3>
      <form onsubmit="handleAddTransaction(event)" class="transaction-form">
        <div class="form-row">

          <div class="form-group">
            <label>Type</label>
            <select id="txn-type" required>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>

          <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" id="txn-amount" placeholder="500" min="1" required />
          </div>

          <div class="form-group">
            <label>Category</label>
            <select id="txn-category" required>
              <option value="food">🍔 Food</option>
              <option value="travel">✈️ Travel</option>
              <option value="bills">💡 Bills</option>
              <option value="shopping">🛍️ Shopping</option>
              <option value="health">💊 Health</option>
              <option value="education">📚 Education</option>
              <option value="salary">💼 Salary</option>
              <option value="other">📦 Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Date</label>
            <input type="date" id="txn-date" required />
          </div>

        </div>

        <div class="form-group full-width">
          <label>Description</label>
          <input type="text" id="txn-desc" placeholder="e.g. Lunch at cafe" required />
        </div>

        <button type="submit" class="btn-primary">Add Transaction</button>
        <p id="txn-msg" class="form-msg"></p>
      </form>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input type="month" id="filter-month" onchange="loadTransactions()" />
      <select id="filter-category" onchange="loadTransactions()">
        <option value="">All Categories</option>
        <option value="food">Food</option>
        <option value="travel">Travel</option>
        <option value="bills">Bills</option>
        <option value="shopping">Shopping</option>
        <option value="health">Health</option>
        <option value="education">Education</option>
        <option value="salary">Salary</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- Transaction List -->
    <div id="transaction-list" class="transaction-list"></div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/transactions.js"></script>
</body>
</html>
